<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students - Student MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-graduation-cap d-block"></i>
        <h4>Student MS</h4>
        <small id="welcomeUser" class="opacity-75"></small>
    </div>
    <nav>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
        <a href="students.html" class="nav-link active"><i class="fas fa-user-graduate"></i> Students</a>
        <a href="courses.html" class="nav-link"><i class="fas fa-book"></i> Courses</a>
    </nav>
    <div class="sidebar-footer">
        <button class="btn btn-outline-light w-100" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">Students</h4>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addStudentModal">
            <i class="fas fa-plus"></i> Add Student
        </button>
    </div>

    <!-- Filters -->
    <div class="table-card mb-4">
        <div class="row g-3 align-items-end">
            <div class="col-md-3 col-sm-6">
                <label class="form-label fw-bold">Filter by Course</label>
                <select class="form-select" id="courseFilter" onchange="filterByCourse()">
                    <option value="">All Courses</option>
                </select>
            </div>
            <div class="col-md-3 col-sm-6">
                <label class="form-label fw-bold">Sort By</label>
                <select class="form-select" id="sortBy" onchange="loadStudents()">
                    <option value="name">Name</option>
                    <option value="email">Email</option>
                </select>
            </div>
            <div class="col-md-3 col-sm-6">
                <label class="form-label fw-bold">Per Page</label>
                <select class="form-select" id="pageSize" onchange="loadStudents()">
                    <option value="5">5</option>
                    <option value="10" selected>10</option>
                    <option value="20">20</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Students Table -->
    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Course</th>
                    <th>Total Fees</th>
                    <th>Paid</th>
                    <th>Pending</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="studentsTable">
                <tr><td colspan="10" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3">
            <small id="pageInfo" class="text-muted"></small>
            <div id="pagination" class="d-flex gap-2"></div>
        </div>
    </div>
</div>

<!-- Add Student Modal -->
<div class="modal fade" id="addStudentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-graduate"></i> Add New Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="studentName" placeholder="Enter full name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="studentEmail" placeholder="Enter email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" id="studentPhone" placeholder="10 digit phone">
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" id="studentAddress" placeholder="Enter address">
                </div>
                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <select class="form-select" id="studentCourse">
                        <option value="">Select Course</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Paid Fees (₹)</label>
                    <input type="number" class="form-control" id="studentPaidFees" placeholder="Amount paid" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Enrollment Date</label>
                    <input type="date" class="form-control" id="studentEnrollmentDate">
                </div>
                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-select" id="studentStatus">
                        <option value="ACTIVE">Active</option>
                        <option value="INACTIVE">Inactive</option>
                    </select>
                </div>
                <div id="studentError" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addStudent()">Add Student</button>
            </div>
        </div>
    </div>
</div>

<!-- Edit Student Modal -->
<div class="modal fade" id="editStudentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit"></i> Edit Student</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editStudentId">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="editStudentName">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="editStudentEmail">
                </div>
                <div class="mb-3">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" id="editStudentPhone">
                </div>
                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <input type="text" class="form-control" id="editStudentAddress">
                </div>
                <div class="mb-3">
                    <label class="form-label">Course</label>
                    <select class="form-select" id="editStudentCourse"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Paid Fees (₹)</label>
                    <input type="number" class="form-control" id="editStudentPaidFees" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Enrollment Date</label>
                    <input type="date" class="form-control" id="editStudentEnrollmentDate">
                </div>
                <div class="mb-3">
                    <label class="form-label">Status</label>
                    <select class="form-select" id="editStudentStatus">
                        <option value="ACTIVE">Active</option>
                        <option value="INACTIVE">Inactive</option>
                    </select>
                </div>
                <div id="editStudentError" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="updateStudent()">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/students.js"></script>
</body>
</html>
