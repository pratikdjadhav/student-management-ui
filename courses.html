<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses - Student MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="sidebar-brand">
        <i class="fas fa-graduation-cap d-block"></i>
        <h4>Student MS</h4>
        <small id="welcomeUser" class="opacity-75"></small>
    </div>
    <nav>
        <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
        <a href="students.html" class="nav-link"><i class="fas fa-user-graduate"></i> Students</a>
        <a href="courses.html" class="nav-link active"><i class="fas fa-book"></i> Courses</a>
    </nav>
    <div class="sidebar-footer">
        <button class="btn btn-outline-light w-100" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</div>

<!-- Main Content -->
<div class="main-content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="fw-bold">Courses</h4>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addCourseModal">
            <i class="fas fa-plus"></i> Add Course
        </button>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Course Name</th>
                    <th>Duration</th>
                    <th>Description</th>
                    <th>Fees</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="coursesTable">
                <tr><td colspan="6" class="text-center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Course Modal -->
<div class="modal fade" id="addCourseModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-book"></i> Add New Course</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Course Name</label>
                    <input type="text" class="form-control" id="courseName" placeholder="e.g. BCA">
                </div>
                <div class="mb-3">
                    <label class="form-label">Duration</label>
                    <input type="text" class="form-control" id="courseDuration" placeholder="e.g. 3 Years">
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" id="courseDescription" rows="2" placeholder="Course description"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Fees (₹)</label>
                    <input type="number" class="form-control" id="courseFees" placeholder="e.g. 15000" min="0">
                </div>
                <div id="courseError" class="alert alert-danger d-none"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addCourse()">Add Course</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/courses.js"></script>
</body>
</html>
