<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-graduation-cap d-block"></i>
            <h2>Student MS</h2>
        </div>
        <ul class="nav nav-pills auth-tabs">
            <li class="nav-item w-50"><button class="nav-link active w-100" id="loginTab" onclick="showLogin()">Login</button></li>
            <li class="nav-item w-50"><button class="nav-link w-100" id="registerTab" onclick="showRegister()">Register</button></li>
        </ul>
        <div id="loginForm">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="loginUsername" placeholder="Enter username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter password">
                </div>
            </div>
            <div id="loginError" class="alert alert-danger d-none"></div>
            <button class="btn btn-primary w-100" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
        </div>
        <div id="registerForm" class="d-none">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="registerUsername" placeholder="Choose username">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="registerPassword" placeholder="Choose password">
                </div>
            </div>
            <div id="registerError" class="alert alert-danger d-none"></div>
            <div id="registerSuccess" class="alert alert-success d-none"></div>
            <button class="btn btn-success w-100" onclick="register()"><i class="fas fa-user-plus"></i> Register</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script>
    if (getToken()) window.location.href = "dashboard.html";
</script>
</body>
</html>
